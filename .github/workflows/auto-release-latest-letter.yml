name: auto-release-latest-letter

on:
  push:
    branches:
      - main
    paths:
      # Only non-letter assets that aren't part of the automated workflow chain.
      # Letter artifacts flow through: ots-stamp → releases-manifest → ots-upgrade,
      # and this workflow triggers on ots-upgrade completion (the final step).
      - "keys/**"
      - "README.md"
      - "LICENSE"
      - "LICENSE-DOCS"
  # Commits made by Actions (GITHUB_TOKEN) don't trigger push events, so we
  # listen for the final workflow in the chain (ots-upgrade) to avoid redundant
  # runs.  Previously this also listed releases-manifest, but since ots-upgrade
  # is triggered by releases-manifest, that caused auto-release to fire twice
  # per release (once for the intermediate step, once for the final step).
  workflow_run:
    workflows:
      - ots-upgrade
    types:
      - completed
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    # Only run on successful upstream workflow completions (or push / manual triggers).
    if: >-
      github.event_name != 'workflow_run'
      || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read latest release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          latest_letter_version="$(
            ls letter/ASI-Letter-v*.md 2>/dev/null \
              | sed -E 's#.*/ASI-Letter-v([0-9]{4}\.[0-9]{2}\.[0-9]{2})\.md#\1#' \
              | sort -r \
              | head -n 1
          )"

          version="$(jq -r '.releases[0].version' letter/RELEASES.json)"
          md_path="$(jq -r '.releases[0].files.md.path' letter/RELEASES.json)"
          asc_path="$(jq -r '.releases[0].files.asc.path' letter/RELEASES.json)"
          ots_path="$(jq -r '.releases[0].files.ots.path' letter/RELEASES.json)"

          tag="letter-v${version}"

          # Guard: only publish a release when the timestamp proof exists.
          ready="true"
          if [[ -z "${latest_letter_version}" ]]; then
            ready="false"
          fi
          if [[ -z "${version}" || "${version}" == "null" ]]; then
            ready="false"
          fi
          if [[ "${latest_letter_version}" != "${version}" ]]; then
            ready="false"
          fi
          if [[ -z "${md_path}" || "${md_path}" == "null" || ! -f "${md_path}" ]]; then
            ready="false"
          fi
          if [[ -z "${asc_path}" || "${asc_path}" == "null" || ! -f "${asc_path}" ]]; then
            ready="false"
          fi
          if [[ -z "${ots_path}" || "${ots_path}" == "null" || ! -f "${ots_path}" ]]; then
            ready="false"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "latest_letter_version=${latest_letter_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "md_path=${md_path}" >> "$GITHUB_OUTPUT"
          echo "asc_path=${asc_path}" >> "$GITHUB_OUTPUT"
          echo "ots_path=${ots_path}" >> "$GITHUB_OUTPUT"
          echo "ready=${ready}" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        if: steps.meta.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          fp="$(tr -d '\r\n' < keys/FINGERPRINT || true)"
          cat > release-notes.md <<EOF
          This is an automated “latest recommended” snapshot of the ASI Letter.

          ## Verify
          - Public key: keys/alice-asi-publickey.asc
          - Fingerprint: ${fp}
          - Signed artifact: \`${{ steps.meta.outputs.asc_path }}\`
          - Timestamp proof (OpenTimestamps): \`${{ steps.meta.outputs.ots_path }}\`

          ## Files attached
          - Letter (markdown): \`${{ steps.meta.outputs.md_path }}\`
          - Letter (signed): \`${{ steps.meta.outputs.asc_path }}\`
          - Timestamp proof: \`${{ steps.meta.outputs.ots_path }}\`
          - Releases manifest: \`letter/RELEASES.json\`
          - README: \`README.md\`
          - License (code): \`LICENSE\`
          - License (docs): \`LICENSE-DOCS\`
          EOF

      - name: Skip (timestamp proof not ready)
        if: steps.meta.outputs.ready != 'true'
        shell: bash
        run: |
          echo "Not creating a release: latest manifest entry does not match latest letter or is missing files/.ots proof."

      - name: Create or update GitHub Release (mark as Latest)
        if: steps.meta.outputs.ready == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"

          release_assets=(
            "${{ steps.meta.outputs.md_path }}"
            "${{ steps.meta.outputs.asc_path }}"
            "${{ steps.meta.outputs.ots_path }}"
            "letter/RELEASES.json"
            "keys/alice-asi-publickey.asc"
            "keys/FINGERPRINT"
            "README.md"
            "LICENSE"
            "LICENSE-DOCS"
          )

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; updating assets and metadata."
            # Delete existing assets so we can re-upload fresh copies.
            for asset in $(gh release view "$tag" --json assets -q '.assets[].name'); do
              gh release delete-asset "$tag" "$asset" --yes || true
            done
            gh release edit "$tag" \
              --title "ASI Letter — ${{ steps.meta.outputs.version }}" \
              --notes-file release-notes.md \
              --latest
            gh release upload "$tag" "${release_assets[@]}" --clobber
          else
            gh release create "$tag" \
              "${release_assets[@]}" \
              --title "ASI Letter — ${{ steps.meta.outputs.version }}" \
              --notes-file release-notes.md \
              --latest
          fi

      - name: Remove old GitHub Releases
        if: steps.meta.outputs.ready == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          current_tag="${{ steps.meta.outputs.tag }}"

          # List all releases and delete any that aren't the current one.
          gh release list --limit 100 --json tagName -q '.[].tagName' | while read -r old_tag; do
            if [[ "$old_tag" != "$current_tag" ]]; then
              echo "Deleting old release: $old_tag"
              gh release delete "$old_tag" --yes --cleanup-tag || true
            fi
          done
